    // 渲染文件消息（带进度条）
    renderFileMessage(who, fileInfo, transferId, isUpload = false) {
        const list = $('message-list');
        
        // 检查是否已存在该传输的消息
        const existingMsg = document.getElementById(`file-${transferId}`);
        if (existingMsg) {
            // 如果已存在，只更新进度
            return;
        }
        
        const div = document.createElement('div');
        div.className = `message ${who}`;
        div.id = `file-${transferId}`;
        
        const sizeStr = this.formatFileSize(fileInfo.size);
        
        div.innerHTML = `
            <div class="file-download">📄 ${fileInfo.name}</div>
            <div class="file-progress" id="progress-${transferId}">
                <div class="file-progress-bar">
                    <div class="file-progress-fill" style="width: 0%"></div>
                </div>
                <div class="file-progress-text">0% - ${sizeStr}</div>
            </div>
            <div class="time">${new Date().toLocaleTimeString()}</div>
        `;
        
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
        
        // 存储引用以便更新进度
        this.fileProgressMap.set(transferId, {
            element: div,
            isUpload: isUpload
        });
        
        // 如果文件已准备好（接收完成或有URL），立即显示下载链接
        if (fileInfo.url) {
            this.completeFileTransfer(transferId, fileInfo);
        }
    },

    // 更新文件传输进度
    // 修改 updateFileProgress 方法，增加容错
    updateFileProgress(transferId, percent, isUpload) {
        const progressContainer = document.getElementById(`progress-${transferId}`);
        if (!progressContainer) {
            //console.warn('进度条不存在:', transferId);
            return;
        }
        
        const progressBar = progressContainer.querySelector('.file-progress-fill');
        const progressText = progressContainer.querySelector('.file-progress-text');
        
        if (progressBar && progressText) {
            const validPercent = Math.max(0, Math.min(100, Math.round(percent)));
            progressBar.style.width = `${validPercent}%`;
            
            const action = isUpload ? '发送' : '接收';
            progressText.innerText = `${validPercent}% ${action}中...`;
            
            if (validPercent === 100) {
                progressBar.style.background = '#2ecc71';
                progressText.innerText = '完成';
            }
        }
    },

    // 完成文件传输，显示下载链接
    completeFileTransfer(transferId, fileInfo) {
        const msgDiv = document.getElementById(`file-${transferId}`);
        if (!msgDiv) {
            console.warn('找不到文件消息元素:', transferId);
            return;
        }
        
        const progressDiv = msgDiv.querySelector('.file-progress');
        if (progressDiv) {
            progressDiv.style.display = 'none';
        }
        
        const downloadDiv = msgDiv.querySelector('.file-download');
        if (downloadDiv && fileInfo.url) {
            const isMyMessage = msgDiv.classList.contains('my');
            const textColor = isMyMessage ? '#fff' : '#007aff';
            downloadDiv.outerHTML = `<a class="file-download" href="${fileInfo.url}" download="${fileInfo.name}" style="color: ${textColor}; text-decoration: underline; cursor: pointer;">📄 ${fileInfo.name} (${this.formatFileSize(fileInfo.size)})</a>`;
        }
        
        // 从map中移除
        this.fileProgressMap.delete(transferId);
    },

    formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    },

    escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    },

    toggleMaximize() {
        const window_ = $('video-window');
        this.videoWindowState.isMaximized = !this.videoWindowState.isMaximized;
        
        if (this.videoWindowState.isMaximized) {
            window_.classList.add('maximized');
            $('btn-maximize').innerText = '🗗';
            $('btn-maximize').title = '还原';
        } else {
            window_.classList.remove('maximized');
            $('btn-maximize').innerText = '⛶';
            $('btn-maximize').title = '全屏';
            // 恢复默认大小
            window_.style.width = '640px';
            window_.style.height = '480px';
            window_.style.top = '50%';
            window_.style.left = '50%';
            window_.style.transform = 'translate(-50%, -50%)';
            this.videoWindowState.scale = 1;
        }
    },

    // 根据分辨率标识获取宽度
    getResWidth(res) {
        const map = {
            'qvga': 320,
            'vga': 640,
            'sd': 720,
            'hd': 1280,
            'fhd': 1920,
            'qhd': 2560,
            '4k': 3840,
            '8k': 7680
        };
        return map[res] || 1280;
    },

    // 根据分辨率标识获取高度
    getResHeight(res) {
        const map = {
            'qvga': 240,
            'vga': 480,
            'sd': 480,
            'hd': 720,
            'fhd': 1080,
            'qhd': 1440,
            '4k': 2160,
            '8k': 4320
        };
        return map[res] || 720;
    },
    // 修改 requestVideoCall 支持屏幕共享
    requestVideoCall() {
        const source = $('vid-source').value;
        const resVal = $('vid-res').value;
        const maxBitrate = parseInt($('vid-bitrate').value) * 1000;

        let constraints;
        let isAutoRes = resVal === 'auto';
        
        if (source === 'screen') {
            // 屏幕共享：自动模式下不指定分辨率，让浏览器自动获取屏幕尺寸
            constraints = {
                video: isAutoRes ? {
                    cursor: 'always',
                    displaySurface: 'monitor'
                } : {
                    cursor: 'always',
                    displaySurface: 'monitor',
                    width: this.getResWidth(resVal),
                    height: this.getResHeight(resVal)
                },
                audio: false
            };
        } else {
            // 摄像头模式
            if (isAutoRes) {
                // 自动模式：使用理想约束，让浏览器选择最佳分辨率
                const facingMode = source === 'camera-back' ? 'environment' : 'user';
                constraints = {
                    video: {
                        facingMode: facingMode,
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: true
                };
            } else {
                const width = this.getResWidth(resVal);
                const height = this.getResHeight(resVal);
                const facingMode = source === 'camera-back' ? 'environment' : 'user';
                
                constraints = {
                    video: { width, height, facingMode },
                    audio: true
                };
            }
        }

        $('video-settings-modal').classList.remove('open');
        
        this.currentBitrate = maxBitrate;
        this.videoConstraints = constraints;
        this.videoSourceType = source;
        this.isAutoResolution = isAutoRes;

        this.webrtc.startVideoCall(constraints, source === 'screen', isAutoRes).then((stream) => {
            // 获取实际分辨率并显示
            const settings = stream.getVideoTracks()[0].getSettings();
            const actualWidth = settings.width;
            const actualHeight = settings.height;
            
            $('current-res').innerText = `${actualWidth}x${actualHeight}`;
            $('res-info').style.display = 'block';
            
            // 更新UI状态
            $('btn-video-call').classList.add('active');
            $('btn-video-call').title = '结束视频通话';
            this.webrtc.isVideoActive = true;
            
            // 根据实际分辨率调整窗口大小（屏幕共享时）
            if (source === 'screen' && isAutoRes) {
                this.adjustWindowToVideo(actualWidth, actualHeight);
            }
            
            // 设置码率
            const senders = this.webrtc.pc.getSenders();
            senders.forEach(sender => {
                if (sender.track && sender.track.kind === 'video') {
                    const params = sender.getParameters();
                    if (!params.encodings) params.encodings = [{}];
                    params.encodings[0].maxBitrate = this.currentBitrate;
                    sender.setParameters(params).catch(e => console.log('设置码率失败', e));
                }
            });
            
            showToast(source === 'screen' ? 
                `屏幕共享已开启 (${actualWidth}x${actualHeight})` : 
                '视频通话已开启'
            );
        }).catch(err => {
            showToast('开启视频失败: ' + err.message);
        });
    },

    // 根据视频实际分辨率调整窗口大小（保持比例）
    adjustWindowToVideo(width, height) {
        const window_ = $('video-window');
        const maxWidth = window.innerWidth * 0.9;
        const maxHeight = window.innerHeight * 0.9;
        
        // 计算缩放比例，保持宽高比
        const videoRatio = width / height;
        const windowRatio = maxWidth / maxHeight;
        
        let newWidth, newHeight;
        
        if (videoRatio > windowRatio) {
            // 视频更宽，以宽度为基准
            newWidth = Math.min(maxWidth, width);
            newHeight = newWidth / videoRatio;
        } else {
            // 视频更高，以高度为基准
            newHeight = Math.min(maxHeight, height);
            newWidth = newHeight * videoRatio;
        }
        
        // 最小尺寸限制
        newWidth = Math.max(320, newWidth);
        newHeight = Math.max(240, newHeight);
        
        window_.style.width = newWidth + 'px';
        window_.style.height = newHeight + 'px';
        window_.style.left = '50%';
        window_.style.top = '50%';
        window_.style.transform = 'translate(-50%, -50%)';
        
        this.videoWindowState.scale = newWidth / 640; // 更新缩放基准
    },


    handleRemoteVideoClosed() {
        //showToast('对方已结束视频通话');
        this.stopVideoCall();
    },
    // 添加停止视频通话方法
    stopVideoCall() {
        if (this.webrtc&&this.webrtc.isVideoActive) {
            this.webrtc.hangup();
            this.webrtc.isVideoActive = false;
        }
        
        // 更新UI
        $('btn-video-call').classList.remove('active');
        $('btn-video-call').title = '发起视频通话';
        $('video-container').classList.add('video-hidden');
        
        // 隐藏分辨率信息
        $('res-info').style.display = 'none';
        $('current-res').innerText = '-';
        
        // 重置窗口状态
        const window_ = $('video-window');
        window_.classList.remove('maximized');
        window_.style.width = '640px';
        window_.style.height = '480px';
        window_.style.top = '50%';
        window_.style.left = '50%';
        window_.style.transform = 'translate(-50%, -50%)';
        this.videoWindowState.scale = 1;
        this.videoWindowState.isMaximized = false;
        $('btn-maximize').innerText = '⛶';
        
        showToast('视频通话已结束');
    },

    // 添加静音切换
    toggleMute() {
        const localVideo = $('local-video');
        if (localVideo.srcObject) {
            const audioTracks = localVideo.srcObject.getAudioTracks();
            audioTracks.forEach(track => {
                track.enabled = !track.enabled;
            });
            $('btn-toggle-mute').classList.toggle('active');
            $('btn-toggle-mute').title = audioTracks[0]?.enabled ? '静音' : '取消静音';
        }
    },

    showLocalVideo(stream) {
        $('local-video').srcObject = stream;
    },

    showVideoContainer() {
        $('video-container').classList.remove('video-hidden');
        // 确保窗口在可视区域内
        const window_ = $('video-window');
        const rect = window_.getBoundingClientRect();
        if (rect.right > window.innerWidth || rect.bottom > window.innerHeight) {
            window_.style.left = '50%';
            window_.style.top = '50%';
            window_.style.transform = 'translate(-50%, -50%)';
        }
    },

    hideVideoContainer() {
        $('video-container').classList.add('video-hidden');
        $('remote-video').srcObject = null;
        $('local-video').srcObject = null;
    }
};

// 启动 UI
UI.init();

</script>
